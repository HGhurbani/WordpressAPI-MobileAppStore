workflows:
  ios-creditphone-release:
    name: Credit Phone Qatar iOS Release

    integrations:
      app_store_connect: CreditPhone_

    environment:
      flutter: stable
      xcode: latest
      groups:
        - woo_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.creditphone.qatar.creditphoneqa

    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Verify WooCommerce env vars exist
        script: |
          if [ -z "$WOO_CONSUMER_KEY" ]; then echo "WOO_CONSUMER_KEY is missing"; exit 1; fi
          if [ -z "$WOO_CONSUMER_SECRET" ]; then echo "WOO_CONSUMER_SECRET is missing"; exit 1; fi
          echo "WooCommerce secrets detected"

      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Build iOS IPA with dart-defines
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --dart-define=WOO_CONSUMER_KEY=$WOO_CONSUMER_KEY \
            --dart-define=WOO_CONSUMER_SECRET=$WOO_CONSUMER_SECRET \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true